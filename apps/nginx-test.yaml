apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-local
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-local
  template:
    metadata:
      labels:
        app: nginx-local
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-local
  namespace: default
spec:
  type: ClusterIP  # 修改为此处，不再占用本地 30080 端口
  ports:
  - port: 80       # Service 端口
    targetPort: 80 # 容器端口
  selector:
    app: nginx-local